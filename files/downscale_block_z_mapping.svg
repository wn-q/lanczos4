<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .label { font: 600 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .blockText { font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .num { font: 800 24px Arial, sans-serif; fill: white; }
      .gridMajor { stroke: #1f2937; stroke-width: 3; fill: none; }
      .gridMinor { stroke: #94a3b8; stroke-width: 1; opacity: 0.65; }
      .mapArrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .zArrow { stroke: #dc2626; stroke-width: 5; fill: none; marker-end: url(#arrow-red); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>

  <!-- Downscale image panel -->
  <g id="downscale" transform="translate(120,240)">
    <rect x="0" y="0" width="360" height="360" fill="#f8fafc" stroke="#0f172a" stroke-width="4"/>
    <rect x="0" y="0" width="180" height="180" fill="#bfdbfe" opacity="0.68"/>
    <rect x="180" y="0" width="180" height="180" fill="#bbf7d0" opacity="0.68"/>
    <rect x="0" y="180" width="180" height="180" fill="#fde68a" opacity="0.74"/>
    <rect x="180" y="180" width="180" height="180" fill="#fecaca" opacity="0.74"/>

    <!-- 4px destination groups -->
    <g>
      <line class="gridMinor" x1="45" y1="0" x2="45" y2="360"/>
      <line class="gridMinor" x1="90" y1="0" x2="90" y2="360"/>
      <line class="gridMinor" x1="135" y1="0" x2="135" y2="360"/>
      <line class="gridMinor" x1="225" y1="0" x2="225" y2="360"/>
      <line class="gridMinor" x1="270" y1="0" x2="270" y2="360"/>
      <line class="gridMinor" x1="315" y1="0" x2="315" y2="360"/>
      <line class="gridMinor" x1="0" y1="45" x2="360" y2="45"/>
      <line class="gridMinor" x1="0" y1="90" x2="360" y2="90"/>
      <line class="gridMinor" x1="0" y1="135" x2="360" y2="135"/>
      <line class="gridMinor" x1="0" y1="225" x2="360" y2="225"/>
      <line class="gridMinor" x1="0" y1="270" x2="360" y2="270"/>
      <line class="gridMinor" x1="0" y1="315" x2="360" y2="315"/>
    </g>

    <line class="gridMajor" x1="180" y1="0" x2="180" y2="360"/>
    <line class="gridMajor" x1="0" y1="180" x2="360" y2="180"/>

    <text x="63" y="76" class="blockText">S0</text>

    <text x="243" y="76" class="blockText">S1</text>

    <text x="63" y="256" class="blockText">S2</text>

    <text x="243" y="256" class="blockText">S3</text>

    <!-- 0 -> 1 -> 2 -> 3 block order -->
    <circle cx="28" cy="28" r="16" fill="#dc2626"/>
    <text x="20" y="37" class="num">0</text>
    <path class="zArrow" d="M52,28 H206"/>
    <circle cx="232" cy="28" r="16" fill="#dc2626"/>
    <text x="224" y="37" class="num">1</text>
    <path class="zArrow" d="M220,54 L56,218"/>
    <circle cx="28" cy="232" r="16" fill="#dc2626"/>
    <text x="20" y="241" class="num">2</text>
    <path class="zArrow" d="M52,232 H206"/>
    <circle cx="232" cy="232" r="16" fill="#dc2626"/>
    <text x="224" y="241" class="num">3</text>
  </g>

  <!-- Source image panel -->
  <g id="source" transform="translate(820,180)">
    <rect x="0" y="0" width="512" height="512" fill="#f8fafc" stroke="#0f172a" stroke-width="4"/>
    <rect x="0" y="0" width="256" height="256" fill="#bfdbfe" opacity="0.68"/>
    <rect x="256" y="0" width="256" height="256" fill="#bbf7d0" opacity="0.68"/>
    <rect x="0" y="256" width="256" height="256" fill="#fde68a" opacity="0.74"/>
    <rect x="256" y="256" width="256" height="256" fill="#fecaca" opacity="0.74"/>

    <!-- 8px source groups -->
    <g>
      <line class="gridMinor" x1="32" y1="0" x2="32" y2="512"/>
      <line class="gridMinor" x1="64" y1="0" x2="64" y2="512"/>
      <line class="gridMinor" x1="96" y1="0" x2="96" y2="512"/>
      <line class="gridMinor" x1="128" y1="0" x2="128" y2="512"/>
      <line class="gridMinor" x1="160" y1="0" x2="160" y2="512"/>
      <line class="gridMinor" x1="192" y1="0" x2="192" y2="512"/>
      <line class="gridMinor" x1="224" y1="0" x2="224" y2="512"/>
      <line class="gridMinor" x1="288" y1="0" x2="288" y2="512"/>
      <line class="gridMinor" x1="320" y1="0" x2="320" y2="512"/>
      <line class="gridMinor" x1="352" y1="0" x2="352" y2="512"/>
      <line class="gridMinor" x1="384" y1="0" x2="384" y2="512"/>
      <line class="gridMinor" x1="416" y1="0" x2="416" y2="512"/>
      <line class="gridMinor" x1="448" y1="0" x2="448" y2="512"/>
      <line class="gridMinor" x1="480" y1="0" x2="480" y2="512"/>
      <line class="gridMinor" x1="0" y1="32" x2="512" y2="32"/>
      <line class="gridMinor" x1="0" y1="64" x2="512" y2="64"/>
      <line class="gridMinor" x1="0" y1="96" x2="512" y2="96"/>
      <line class="gridMinor" x1="0" y1="128" x2="512" y2="128"/>
      <line class="gridMinor" x1="0" y1="160" x2="512" y2="160"/>
      <line class="gridMinor" x1="0" y1="192" x2="512" y2="192"/>
      <line class="gridMinor" x1="0" y1="224" x2="512" y2="224"/>
      <line class="gridMinor" x1="0" y1="288" x2="512" y2="288"/>
      <line class="gridMinor" x1="0" y1="320" x2="512" y2="320"/>
      <line class="gridMinor" x1="0" y1="352" x2="512" y2="352"/>
      <line class="gridMinor" x1="0" y1="384" x2="512" y2="384"/>
      <line class="gridMinor" x1="0" y1="416" x2="512" y2="416"/>
      <line class="gridMinor" x1="0" y1="448" x2="512" y2="448"/>
      <line class="gridMinor" x1="0" y1="480" x2="512" y2="480"/>
    </g>

    <line class="gridMajor" x1="256" y1="0" x2="256" y2="512"/>
    <line class="gridMajor" x1="0" y1="256" x2="512" y2="256"/>

    <text x="94" y="108" class="blockText">D0</text>

    <text x="350" y="108" class="blockText">D1</text>

    <text x="94" y="364" class="blockText">D2</text>

    <text x="350" y="364" class="blockText">D3</text>

    <!-- 0 -> 1 -> 2 -> 3 block order -->
    <circle cx="34" cy="34" r="17" fill="#dc2626"/>
    <text x="26" y="43" class="num">0</text>
    <path class="zArrow" d="M60,34 H294"/>
    <circle cx="320" cy="34" r="17" fill="#dc2626"/>
    <text x="312" y="43" class="num">1</text>
    <path class="zArrow" d="M306,62 L62,306"/>
    <circle cx="34" cy="320" r="17" fill="#dc2626"/>
    <text x="26" y="329" class="num">2</text>
    <path class="zArrow" d="M60,320 H294"/>
    <circle cx="320" cy="320" r="17" fill="#dc2626"/>
    <text x="312" y="329" class="num">3</text>
  </g>

  <!-- Mapping arrows from downscale regions to source blocks -->
  <path class="mapArrow" d="M210,240 C410,150 700,130 948,180"/>
  <path class="mapArrow" d="M480,330 C650,300 970,285 1204,308"/>
  <path class="mapArrow" d="M210,600 C430,720 700,735 948,692"/>
  <path class="mapArrow" d="M390,600 C580,760 935,760 1204,692"/>

</svg>
