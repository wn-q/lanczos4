<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .state { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.2; rx: 18; }
      .state-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.8; rx: 18; }
      .state-green { fill: #ecfdf5; stroke: #059669; stroke-width: 2.8; rx: 18; }
      .state-name { font: 700 23px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .state-text { font: 17px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 15px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .code { font: 15px Consolas, "Courier New", monospace; fill: #1e293b; }
      .edge { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .edge-green { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arrow-green); }
      .edge-thin { fill: none; stroke: #64748b; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .panel { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.8; rx: 14; }
      .panel2 { fill: #f0f9ff; stroke: #0284c7; stroke-width: 1.8; rx: 14; }
      .panel3 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.8; rx: 14; }
      .panel-title { font: 700 21px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="920"/>

  <text x="750" y="55" text-anchor="middle" class="title">downscale_block_buffer.v - Window FSM</text>
  <text x="750" y="87" text-anchor="middle" class="subtitle">64-tap window read 状态机，按 win_idx = y_idx * 8 + x_idx 逐个收集像素</text>

  <!-- State row -->
  <rect x="70" y="180" width="220" height="126" class="state"/>
  <text x="180" y="222" text-anchor="middle" class="state-name">WIN_IDLE</text>
  <text x="180" y="258" text-anchor="middle" class="state-text">等待新的 center</text>
  <text x="180" y="284" text-anchor="middle" class="small">busy = 0</text>

  <rect x="390" y="162" width="280" height="162" class="state-blue"/>
  <text x="530" y="205" text-anchor="middle" class="state-name">WIN_TAP_PREP</text>
  <text x="530" y="241" text-anchor="middle" class="state-text">计算当前 tap 坐标</text>
  <text x="530" y="268" text-anchor="middle" class="state-text">判断取数来源</text>
  <text x="530" y="296" text-anchor="middle" class="small">direct source 或 SRAM source</text>

  <rect x="790" y="100" width="250" height="126" class="state"/>
  <text x="915" y="143" text-anchor="middle" class="state-name">WIN_SRAM_READ</text>
  <text x="915" y="179" text-anchor="middle" class="state-text">发起同步 SRAM 读</text>
  <text x="915" y="204" text-anchor="middle" class="small">line_buffer / bottom_buffer</text>

  <rect x="790" y="300" width="250" height="126" class="state"/>
  <text x="915" y="343" text-anchor="middle" class="state-name">WIN_SRAM_SAVE</text>
  <text x="915" y="379" text-anchor="middle" class="state-text">保存 dout 中的 lane</text>
  <text x="915" y="404" text-anchor="middle" class="small">写入 window 输出寄存器</text>

  <rect x="1190" y="180" width="230" height="126" class="state-green"/>
  <text x="1305" y="222" text-anchor="middle" class="state-name">WIN_DONE</text>
  <text x="1305" y="258" text-anchor="middle" class="state-text">window_valid 拉高 1 拍</text>
  <text x="1305" y="284" text-anchor="middle" class="small">然后回到 WIN_IDLE</text>

  <!-- Clean arrows without overlapping text -->
  <path class="edge" d="M290,243 L390,243"/>
  <path class="edge" d="M670,190 C720,150 740,163 790,163"/>
  <path class="edge" d="M915,226 L915,300"/>
  <path class="edge" d="M1040,363 C1115,345 1145,285 1190,252"/>
  <path class="edge-green" d="M1190,220 C975,20 410,20 215,180"/>
  <path class="edge-thin" d="M790,376 C710,465 555,455 530,324"/>

  <!-- Direct path explanation -->
  <rect x="390" y="405" width="280" height="104" class="panel3"/>
  <text x="530" y="438" text-anchor="middle" class="panel-title">direct path</text>
  <text x="530" y="468" text-anchor="middle" class="state-text">寄存器来源当拍写入结果</text>
  <text x="530" y="493" text-anchor="middle" class="small">right / cur16 / left7 / corner / invalid</text>
  <path class="edge-green" d="M530,405 L530,324"/>

  <!-- Arrow labels placed as separate panels -->
  <rect x="300" y="120" width="260" height="54" class="panel2"/>
  <text x="430" y="142" text-anchor="middle" class="small">启动条件</text>
  <text x="430" y="164" text-anchor="middle" class="code">ST_WINDOW_BUSY &amp;&amp; center_ready</text>

  <rect x="705" y="236" width="190" height="44" class="panel2"/>
  <text x="800" y="264" text-anchor="middle" class="code">下一拍</text>

  <rect x="1045" y="320" width="185" height="64" class="panel2"/>
  <text x="1137" y="345" text-anchor="middle" class="small">tap63 收齐</text>
  <text x="1137" y="369" text-anchor="middle" class="code">go WIN_DONE</text>

  <!-- Bottom panels -->
  <rect x="80" y="600" width="405" height="180" class="panel"/>
  <text x="110" y="638" class="panel-title">状态含义</text>
  <text x="110" y="674" class="state-text">WIN_IDLE: 等待 scanner 给出 center</text>
  <text x="110" y="704" class="state-text">WIN_TAP_PREP: 计算 tap 并选择来源</text>
  <text x="110" y="734" class="state-text">WIN_DONE: 64 个 tap 已写入输出寄存器</text>

  <rect x="545" y="600" width="405" height="180" class="panel2"/>
  <text x="575" y="638" class="panel-title">两类取数路径</text>
  <text x="575" y="674" class="state-text">direct: right_buffer / cur16_reg / left7_reg / corner_buffer</text>
  <text x="575" y="704" class="state-text">SRAM: line_buffer / bottom_buffer</text>
  <text x="575" y="734" class="state-text">SRAM 来源需要 READ 和 SAVE 两个状态</text>

  <rect x="1010" y="600" width="405" height="180" class="panel3"/>
  <text x="1040" y="638" class="panel-title">输出信号</text>
  <text x="1040" y="674" class="code">scan_window_busy_o = win_state != WIN_IDLE</text>
  <text x="1040" y="704" class="code">window_done = win_state == WIN_DONE</text>
  <text x="1040" y="734" class="state-text">WIN_DONE 时 valid 只拉高一个周期</text>
</svg>
