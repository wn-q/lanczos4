<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .block { fill: #f8fafc; stroke: #111827; stroke-width: 3; }
      .right { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
      .rightNoSave { fill: #e5e7eb; stroke: #6b7280; stroke-width: 3; stroke-dasharray: 8 6; }
      .label { font: 700 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .small { font: 600 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #374151; }
      .note { font: 600 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #92400e; }
      .grayNote { font: 600 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #4b5563; }
      .dashArrow { stroke: #2563eb; stroke-width: 4; fill: none; stroke-dasharray: 12 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="560" fill="#ffffff"/>

  <g transform="translate(80,160)">
    <rect class="block" x="0" y="0" width="320" height="220"/>
    <rect class="right" x="276" y="0" width="44" height="220"/>
    <text class="label" x="108" y="105">Block0</text>
    <text class="note" x="215" y="252">right_buffer</text>
  </g>

  <g transform="translate(480,160)">
    <rect class="block" x="0" y="0" width="320" height="220"/>
    <rect class="right" x="276" y="0" width="44" height="220"/>
    <text class="label" x="108" y="105">Block1</text>
    <text class="note" x="215" y="252">right_buffer</text>
  </g>

  <g transform="translate(880,160)">
    <rect class="block" x="0" y="0" width="320" height="220"/>
    <rect class="rightNoSave" x="276" y="0" width="44" height="220"/>
    <text class="label" x="108" y="90">Block2</text>
    <text class="small" x="84" y="128">frame_right_edge</text>
    <text class="grayNote" x="204" y="252">不保存右边界</text>
  </g>

  <path class="dashArrow" d="M756,150 C610,120 520,120 400,150"/>
  <text class="small" x="440" y="104">Block1 right_buffer 替换 Block0 right_buffer</text>
</svg>
