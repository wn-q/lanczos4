<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .top-box { fill: #ffffff; stroke: #111827; stroke-width: 3; rx: 18; }
      .module-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 16; }
      .module-green { fill: #ecfdf5; stroke: #059669; stroke-width: 3; rx: 16; }
      .module-orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; rx: 16; }
      .module-gray { fill: #f8fafc; stroke: #475569; stroke-width: 2.4; rx: 14; }
      .input-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.8; rx: 12; }
      .title { font: 700 38px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .module-title { font: 700 26px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .body { font: 18px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 16px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .code { font: 16px Consolas, "Courier New", monospace; fill: #1e293b; }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .edge-green { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arrow-green); }
      .edge-orange { fill: none; stroke: #ea580c; stroke-width: 3; marker-end: url(#arrow-orange); }
      .edge-soft { fill: none; stroke: #94a3b8; stroke-width: 2.2; stroke-dasharray: 8 8; marker-end: url(#arrow-blue); }
      .label { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 9; }
      .label-text { font: 15px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.8; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1100"/>
  <text x="850" y="58" text-anchor="middle" class="title">Downscale Top Module Structure</text>
  <text x="850" y="92" text-anchor="middle" class="subtitle">top 层把 scan_ctrl、buffer、lanczos4_core 接起来，并处理 scale=1 bypass</text>

  <!-- Top boundary -->
  <rect x="55" y="125" width="1590" height="850" class="top-box"/>
  <text x="90" y="165" class="module-title">top</text>

  <!-- Input boxes -->
  <rect x="95" y="205" width="300" height="115" class="input-box"/>
  <text x="125" y="238" class="module-title">fg2pp input</text>
  <text x="125" y="270" class="code">fg2pp_ctrl</text>
  <text x="125" y="296" class="code">fg2pp_data / vld / rdy</text>

  <rect x="95" y="375" width="300" height="125" class="input-box"/>
  <text x="125" y="408" class="module-title">frame size</text>
  <text x="125" y="440" class="code">sw_pic_height</text>
  <text x="125" y="466" class="code">sw_upscale_pic_width</text>

  <rect x="95" y="555" width="300" height="145" class="input-box"/>
  <text x="125" y="588" class="module-title">downscale config</text>
  <text x="125" y="620" class="code">sw_downscale_scale</text>
  <text x="125" y="646" class="code">sw_downscale_width</text>
  <text x="125" y="672" class="code">sw_downscale_height</text>

  <rect x="95" y="755" width="300" height="95" class="input-box"/>
  <text x="125" y="788" class="module-title">global</text>
  <text x="125" y="820" class="code">clk / rst_n / bypass_en</text>

  <!-- Modules -->
  <rect x="505" y="230" width="360" height="245" class="module-blue"/>
  <text x="685" y="275" text-anchor="middle" class="module-title">buffer</text>
  <text x="540" y="315" class="body">接收并缓存 fg2pp_data</text>
  <text x="540" y="347" class="body">锁存 block/frame/tile 信息</text>
  <text x="540" y="379" class="body">根据 center 取 64 tap</text>
  <text x="540" y="411" class="small">line/right/bottom/corner buffer</text>

  <rect x="505" y="590" width="360" height="220" class="module-green"/>
  <text x="685" y="635" text-anchor="middle" class="module-title">scan_ctrl</text>
  <text x="540" y="675" class="body">决定要计算哪个 dst 点</text>
  <text x="540" y="707" class="body">产生 center_x / center_y</text>
  <text x="540" y="739" class="body">产生 phase_x / phase_y</text>
  <text x="540" y="771" class="small">保存 dst/phase 并对齐 window</text>

  <rect x="1035" y="390" width="360" height="245" class="module-orange"/>
  <text x="1215" y="435" text-anchor="middle" class="module-title">lanczos4_core</text>
  <text x="1070" y="475" class="body">输入 64 tap pixels</text>
  <text x="1070" y="507" class="body">输入 phase_x / phase_y</text>
  <text x="1070" y="539" class="body">执行 Lanczos4 filter</text>
  <text x="1070" y="571" class="small">输出 downscale pixel</text>

  <rect x="1035" y="735" width="360" height="105" class="module-gray"/>
  <text x="1215" y="778" text-anchor="middle" class="module-title">top bypass path</text>
  <text x="1070" y="812" class="body">scale=1 时 fg2pp_data 延迟后直出</text>

  <rect x="1470" y="475" width="125" height="145" class="module-gray"/>
  <text x="1532" y="523" text-anchor="middle" class="module-title">MUX</text>
  <text x="1532" y="558" text-anchor="middle" class="small">bypass_en</text>
  <text x="1532" y="583" text-anchor="middle" class="small">select</text>

  <rect x="1470" y="690" width="125" height="105" class="input-box"/>
  <text x="1532" y="733" text-anchor="middle" class="module-title">output</text>
  <text x="1532" y="765" text-anchor="middle" class="code">data/vld/rdy</text>

  <!-- External inputs to modules -->
  <path class="edge-blue" d="M395,255 L505,285"/>
  <path class="edge-blue" d="M395,285 L505,330"/>
  <rect x="410" y="225" width="140" height="42" class="label"/>
  <text x="480" y="252" text-anchor="middle" class="label-text">ctrl/data 给 buffer</text>

  <path class="edge-blue" d="M395,438 L505,395"/>
  <rect x="400" y="390" width="150" height="42" class="label"/>
  <text x="475" y="417" text-anchor="middle" class="label-text">frame clip 信息</text>

  <path class="edge-green" d="M395,625 L505,650"/>
  <rect x="405" y="590" width="150" height="42" class="label"/>
  <text x="480" y="617" text-anchor="middle" class="label-text">scale/dst size</text>

  <!-- clk/rst dashed to all modules -->
  <path class="edge-soft" d="M395,805 C445,840 455,470 505,445"/>
  <path class="edge-soft" d="M395,805 C440,865 455,780 505,760"/>
  <path class="edge-soft" d="M395,805 C760,920 975,655 1035,600"/>

  <!-- buffer <-> scan block info -->
  <path class="edge-blue" d="M625,475 C600,525 600,550 625,590"/>
  <rect x="360" y="504" width="255" height="58" class="label"/>
  <text x="487" y="527" text-anchor="middle" class="label-text">buffer -> scan</text>
  <text x="487" y="548" text-anchor="middle" class="code">block info + valid/ready</text>

  <!-- scan -> buffer center request -->
  <path class="edge-green" d="M745,590 C805,535 805,485 745,475"/>
  <rect x="785" y="500" width="220" height="58" class="label"/>
  <text x="895" y="523" text-anchor="middle" class="label-text">scan -> buffer</text>
  <text x="895" y="544" text-anchor="middle" class="code">center request</text>

  <!-- buffer -> scan window return -->
  <path class="edge-blue" d="M865,385 C945,445 945,560 865,675"/>
  <rect x="875" y="610" width="215" height="58" class="label"/>
  <text x="982" y="633" text-anchor="middle" class="label-text">buffer -> scan</text>
  <text x="982" y="654" text-anchor="middle" class="code">64 tap window</text>

  <!-- scan -> core -->
  <path class="edge-green" d="M865,700 C970,690 1000,595 1035,545"/>
  <rect x="890" y="700" width="235" height="72" class="label"/>
  <text x="1007" y="724" text-anchor="middle" class="label-text">scan -> core</text>
  <text x="1007" y="746" text-anchor="middle" class="code">dst/phase + 64tap</text>
  <text x="1007" y="766" text-anchor="middle" class="code">valid/ready</text>

  <!-- core -> mux -->
  <path class="edge-orange" d="M1395,512 L1470,530"/>
  <rect x="1388" y="470" width="105" height="42" class="label"/>
  <text x="1440" y="497" text-anchor="middle" class="label-text">normal path</text>

  <!-- bypass path -->
  <path class="edge-orange" d="M395,285 C710,955 1160,925 1470,590"/>
  <rect x="760" y="870" width="290" height="58" class="label"/>
  <text x="905" y="893" text-anchor="middle" class="label-text">scale=1 top bypass</text>
  <text x="905" y="914" text-anchor="middle" class="code">fg2pp_data_delay_1p</text>

  <path class="edge-blue" d="M1532,620 L1532,690"/>

  <!-- core internal bypass note -->
  <rect x="1035" y="650" width="360" height="60" class="legend"/>
  <text x="1060" y="676" class="small">core_bypass_en: phase 命中整数采样点时，core 内部可直接取 center pixel</text>
  <text x="1060" y="699" class="small">不同于 top_bypass_en(scale=1)</text>

  <!-- Bottom summary -->
  <rect x="95" y="900" width="1465" height="48" class="legend"/>
  <text x="120" y="930" class="body">一句话：fg2pp_ctrl/data 属于 buffer；scale/dst_size 属于 scan_ctrl；64 tap + phase 属于 lanczos4_core；top 负责握手连接和 scale=1 bypass mux。</text>
</svg>
