<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 36px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .image-box { fill: #ffffff; stroke: #111827; stroke-width: 4; }
      .tile { fill: #f8fafc; stroke: #2563eb; stroke-width: 3; }
      .block { fill: #eef2ff; stroke: #334155; stroke-width: 1.8; }
      .boundary { stroke: #dc2626; stroke-width: 5; }
      .boundary-callout { fill: #ffffff; stroke: #dc2626; stroke-width: 1.8; rx: 10; }
      .boundary-label { font: 700 17px Arial, "Microsoft YaHei", sans-serif; fill: #b91c1c; }
      .callout-line { stroke: #dc2626; stroke-width: 2.4; fill: none; }
      .halo { fill: #fef3c7; opacity: 0.72; stroke: none; }
      .tile-label { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #1d4ed8; }
      .block-label { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 16px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .note-title { font: 700 20px Arial, "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .note { font: 17px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .legend { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.6; rx: 12; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="980"/>

  <text x="750" y="52" text-anchor="middle" class="title">Image Split Into 4 Touching Tiles</text>
  <text x="750" y="84" text-anchor="middle" class="subtitle">Each tile contains 6 blocks: 2 rows x 3 columns. Red lines are shared tile boundaries.</text>

  <!-- Layout constants:
       image origin = (150,130), tile = 560x330, image = 1120x660
       block = 186.666x165, 3 columns x 2 rows per tile
  -->

  <!-- Whole image outline -->
  <rect x="150" y="130" width="1120" height="660" class="image-box"/>

  <!-- Tiles touch each other: 2x2 no gap -->
  <rect x="150" y="130" width="560" height="330" class="tile"/>
  <rect x="710" y="130" width="560" height="330" class="tile"/>
  <rect x="150" y="460" width="560" height="330" class="tile"/>
  <rect x="710" y="460" width="560" height="330" class="tile"/>

  <!-- Lanczos4 halo/cache bands around shared tile boundaries -->
  <rect x="686" y="130" width="48" height="660" class="halo"/>
  <rect x="150" y="436" width="1120" height="48" class="halo"/>

  <!-- Shared tile boundaries -->
  <line x1="710" y1="130" x2="710" y2="790" class="boundary"/>
  <line x1="150" y1="460" x2="1270" y2="460" class="boundary"/>

  <!-- Tile labels -->
  <text x="178" y="164" class="tile-label">tile0</text>
  <text x="738" y="164" class="tile-label">tile1</text>
  <text x="178" y="494" class="tile-label">tile2</text>
  <text x="738" y="494" class="tile-label">tile3</text>

  <!-- Blocks: tile0 -->
  <rect x="150" y="130" width="186.666" height="165" class="block"/>
  <rect x="336.666" y="130" width="186.666" height="165" class="block"/>
  <rect x="523.332" y="130" width="186.668" height="165" class="block"/>
  <rect x="150" y="295" width="186.666" height="165" class="block"/>
  <rect x="336.666" y="295" width="186.666" height="165" class="block"/>
  <rect x="523.332" y="295" width="186.668" height="165" class="block"/>
  <text x="243.333" y="220" text-anchor="middle" class="block-label">block0</text>
  <text x="429.999" y="220" text-anchor="middle" class="block-label">block1</text>
  <text x="616.666" y="220" text-anchor="middle" class="block-label">block2</text>
  <text x="243.333" y="385" text-anchor="middle" class="block-label">block3</text>
  <text x="429.999" y="385" text-anchor="middle" class="block-label">block4</text>
  <text x="616.666" y="385" text-anchor="middle" class="block-label">block5</text>

  <!-- Blocks: tile1 -->
  <rect x="710" y="130" width="186.666" height="165" class="block"/>
  <rect x="896.666" y="130" width="186.666" height="165" class="block"/>
  <rect x="1083.332" y="130" width="186.668" height="165" class="block"/>
  <rect x="710" y="295" width="186.666" height="165" class="block"/>
  <rect x="896.666" y="295" width="186.666" height="165" class="block"/>
  <rect x="1083.332" y="295" width="186.668" height="165" class="block"/>
  <text x="803.333" y="220" text-anchor="middle" class="block-label">block0</text>
  <text x="989.999" y="220" text-anchor="middle" class="block-label">block1</text>
  <text x="1176.666" y="220" text-anchor="middle" class="block-label">block2</text>
  <text x="803.333" y="385" text-anchor="middle" class="block-label">block3</text>
  <text x="989.999" y="385" text-anchor="middle" class="block-label">block4</text>
  <text x="1176.666" y="385" text-anchor="middle" class="block-label">block5</text>

  <!-- Blocks: tile2 -->
  <rect x="150" y="460" width="186.666" height="165" class="block"/>
  <rect x="336.666" y="460" width="186.666" height="165" class="block"/>
  <rect x="523.332" y="460" width="186.668" height="165" class="block"/>
  <rect x="150" y="625" width="186.666" height="165" class="block"/>
  <rect x="336.666" y="625" width="186.666" height="165" class="block"/>
  <rect x="523.332" y="625" width="186.668" height="165" class="block"/>
  <text x="243.333" y="550" text-anchor="middle" class="block-label">block0</text>
  <text x="429.999" y="550" text-anchor="middle" class="block-label">block1</text>
  <text x="616.666" y="550" text-anchor="middle" class="block-label">block2</text>
  <text x="243.333" y="715" text-anchor="middle" class="block-label">block3</text>
  <text x="429.999" y="715" text-anchor="middle" class="block-label">block4</text>
  <text x="616.666" y="715" text-anchor="middle" class="block-label">block5</text>

  <!-- Blocks: tile3 -->
  <rect x="710" y="460" width="186.666" height="165" class="block"/>
  <rect x="896.666" y="460" width="186.666" height="165" class="block"/>
  <rect x="1083.332" y="460" width="186.668" height="165" class="block"/>
  <rect x="710" y="625" width="186.666" height="165" class="block"/>
  <rect x="896.666" y="625" width="186.666" height="165" class="block"/>
  <rect x="1083.332" y="625" width="186.668" height="165" class="block"/>
  <text x="803.333" y="550" text-anchor="middle" class="block-label">block0</text>
  <text x="989.999" y="550" text-anchor="middle" class="block-label">block1</text>
  <text x="1176.666" y="550" text-anchor="middle" class="block-label">block2</text>
  <text x="803.333" y="715" text-anchor="middle" class="block-label">block3</text>
  <text x="989.999" y="715" text-anchor="middle" class="block-label">block4</text>
  <text x="1176.666" y="715" text-anchor="middle" class="block-label">block5</text>

  <!-- Boundary overlay: draw after blocks so the red shared boundaries are visible -->
  <line x1="710" y1="130" x2="710" y2="790" class="boundary"/>
  <line x1="150" y1="460" x2="1270" y2="460" class="boundary"/>

  <!-- Boundary callouts -->
  <rect x="555" y="103" width="310" height="42" class="boundary-callout"/>
  <text x="710" y="130" text-anchor="middle" class="boundary-label">vertical tile boundary: tile0/tile2 | tile1/tile3</text>
  <line x1="710" y1="145" x2="710" y2="190" class="callout-line"/>

  <rect x="1288" y="418" width="185" height="84" class="boundary-callout"/>
  <text x="1380" y="448" text-anchor="middle" class="boundary-label">horizontal</text>
  <text x="1380" y="473" text-anchor="middle" class="boundary-label">tile boundary</text>
  <text x="1380" y="496" text-anchor="middle" class="small">top tiles | bottom tiles</text>
  <line x1="1288" y1="460" x2="1270" y2="460" class="callout-line"/>

  <rect x="735" y="482" width="205" height="54" class="boundary-callout"/>
  <text x="837" y="507" text-anchor="middle" class="boundary-label">4-tile corner</text>
  <text x="837" y="529" text-anchor="middle" class="small">corner halo/cache point</text>
  <line x1="735" y1="482" x2="710" y2="460" class="callout-line"/>

  <!-- Boundary labels -->
  <text x="710" y="824" text-anchor="middle" class="small">vertical tile boundary</text>
  <text x="1310" y="466" class="small">horizontal tile boundary</text>

  <!-- Legend -->
  <rect x="150" y="835" width="1120" height="95" class="legend"/>
  <rect x="185" y="868" width="34" height="22" class="halo"/>
  <text x="235" y="886" class="note">黄色带：Lanczos4 跨 tile 边界时可能需要缓存/请求的 halo 区域示意</text>
  <line x1="790" y1="879" x2="850" y2="879" class="boundary"/>
  <text x="870" y="886" class="note">红线：tile 共享边界</text>
</svg>
